[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "sim-pipeline"
version = "0.1.0"
description = "Sonar vision simulation pipeline"
requires-python = ">=3.9"

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
where = ["."]
include = ["sim_pipeline*"]
